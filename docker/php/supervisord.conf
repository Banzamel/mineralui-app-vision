[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/log/supervisor/supervisord.pid

[program:laravel-serve]
; --no-reload — Laravel 11+ domyślnie restartuje server przy każdej zmianie .env,
; co zrywa aktywny request (instalacja zapisuje DB creds do .env i padał na 502).
command=php /app/artisan serve --host=0.0.0.0 --port=8000 --no-reload
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/serve.log

[program:laravel-queue]
command=php /app/artisan queue:listen --tries=3 --timeout=90
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/queue.log

[program:laravel-scheduler]
command=php /app/artisan schedule:work
autostart=true
autorestart=true
redirect_stderr=true
stdout_logfile=/var/log/supervisor/scheduler.log
